<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyperliquid Price Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.1/moment.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            100: '#1e293b',
                            200: '#0f172a',
                            300: '#020617',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Custom scrollbar for robust list view */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body class="bg-dark-300 text-slate-200 min-h-screen font-sans selection:bg-blue-500/30">
    <div class="fixed inset-0 z-[-1] overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-2/3 h-2/3 rounded-full bg-blue-900/20 blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-2/3 h-2/3 rounded-full bg-purple-900/20 blur-[120px]"></div>
    </div>

    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1
                    class="text-3xl md:text-4xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 via-indigo-400 to-purple-400 tracking-tight">
                    Hyperliquid Tracker
                </h1>
                <div class="text-sm text-slate-400 mt-1 flex items-center gap-2">
                    <i data-lucide="clock" class="w-4 h-4"></i>
                    Last Updated: <span id="lastRefreshTime" class="font-mono text-slate-300">-</span>
                </div>
            </div>

            <div class="flex flex-wrap items-center gap-3 w-full md:w-auto">
                <div class="relative flex-grow md:flex-grow-0">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                    <input type="text" id="newCoin" placeholder="Add token (e.g. BTC, SOL)"
                        class="w-full md:w-64 pl-9 pr-4 py-2.5 rounded-xl glass-card text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500/50 transition-all">
                </div>

                <div class="flex rounded-xl glass-card p-1">
                    <button id="viewGridBtn" class="p-2 rounded-lg bg-blue-500/20 text-blue-400 transition-colors"
                        title="Grid View">
                        <i data-lucide="layout-grid" class="w-5 h-5"></i>
                    </button>
                    <button id="viewListBtn" class="p-2 rounded-lg hover:bg-white/5 transition-colors text-slate-400"
                        title="List View">
                        <i data-lucide="list" class="w-5 h-5"></i>
                    </button>
                </div>

                <button id="settingsBtn"
                    class="flex items-center gap-2 px-4 py-2.5 rounded-xl glass-card hover:bg-white/10 transition-all text-slate-300 hover:text-white">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                    <span class="hidden sm:inline">Settings</span>
                </button>
            </div>
        </header>

        <div id="loadingIndicator" class="text-center py-12 hidden">
            <i data-lucide="loader-2" class="w-8 h-8 animate-spin mx-auto text-blue-400 mb-4"></i>
            <p class="text-slate-400">Fetching market data...</p>
        </div>

        <div id="pricesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"></div>

        <div id="pricesList" class="hidden w-full overflow-x-auto glass-card rounded-2xl shadow-xl">
            <table class="w-full text-left border-collapse whitespace-nowrap">
                <thead>
                    <tr
                        class="border-b border-slate-700/50 text-slate-400 text-sm tracking-wider uppercase bg-slate-800/20">
                        <th class="px-6 py-4 font-medium">Asset</th>
                        <th class="px-6 py-4 font-medium">Price (USD)</th>
                        <th class="px-6 py-4 font-medium">24h Change</th>
                        <th class="px-6 py-4 font-medium">24h Volume (USD)</th>
                        <th class="px-6 py-4 font-medium text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="pricesListBody" class="divide-y divide-slate-700/50">
                </tbody>
            </table>
        </div>
    </div>

    <div id="calculatorModal"
        class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden items-center justify-center z-50 p-4 transition-opacity">
        <div class="glass-card rounded-2xl w-full max-w-md border border-slate-700/50 shadow-2xl overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-700/50 flex justify-between items-center bg-slate-800/30">
                <h2 class="text-xl font-bold flex items-center gap-2" id="calcModalTitle">
                    <i data-lucide="calculator" class="w-5 h-5 text-blue-400"></i>
                    Calculator
                </h2>
                <button id="closeCalc" class="text-slate-400 hover:text-white transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <div class="p-6 space-y-6 max-h-[80vh] overflow-y-auto">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs text-slate-400 uppercase tracking-wider mb-1">Current Price</label>
                        <input type="text" id="currentPrice" readonly
                            class="w-full p-2.5 bg-slate-800/50 border border-slate-700 rounded-lg text-white font-mono">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 uppercase tracking-wider mb-1">24h Change</label>
                        <input type="text" id="priceChange" readonly
                            class="w-full p-2.5 bg-slate-800/50 border border-slate-700 rounded-lg text-white font-mono">
                    </div>
                </div>

                <div class="p-5 rounded-xl bg-slate-800/40 border border-slate-700/50">
                    <h3 class="font-semibold text-slate-200 mb-4 flex items-center gap-2">
                        <i data-lucide="bell" class="w-4 h-4 text-purple-400"></i> Alerts
                    </h3>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">Notify Above ($)</label>
                            <input type="number" id="abovePrice" placeholder="0.00"
                                class="w-full p-2.5 bg-slate-900/50 border border-slate-700 rounded-lg focus:ring-2 focus:ring-purple-500/50 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">Notify Below ($)</label>
                            <input type="number" id="belowPrice" placeholder="0.00"
                                class="w-full p-2.5 bg-slate-900/50 border border-slate-700 rounded-lg focus:ring-2 focus:ring-purple-500/50 outline-none transition-all">
                        </div>
                        <button id="saveNotifications"
                            class="w-full mt-2 bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-medium px-4 py-2.5 rounded-lg hover:from-emerald-400 hover:to-teal-500 transition-all shadow-lg shadow-emerald-500/20">
                            Save Alerts
                        </button>
                    </div>
                </div>

                <div class="p-5 rounded-xl bg-slate-800/40 border border-slate-700/50">
                    <h3 class="font-semibold text-slate-200 mb-4 flex items-center gap-2">
                        <i data-lucide="target" class="w-4 h-4 text-blue-400"></i> Target Calculator
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs text-slate-400 mb-1">Percentage Change (%)</label>
                            <input type="number" id="percentageInput" placeholder="e.g., 10 or -5"
                                class="w-full p-2.5 bg-slate-900/50 border border-slate-700 rounded-lg focus:ring-2 focus:ring-blue-500/50 outline-none transition-all">
                        </div>
                        <div id="calculations"
                            class="bg-slate-900/50 p-3 rounded-lg border border-slate-700 space-y-2 text-sm">
                            <div class="flex justify-between">
                                <span class="text-slate-400">Target Price:</span>
                                <span id="targetPrice" class="font-mono font-medium text-white">-</span>
                            </div>
                            <div class="flex justify-between">
                                <span class="text-slate-400">Difference:</span>
                                <span id="priceDiff" class="font-mono font-medium text-white">-</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="settingsModal"
        class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="glass-card rounded-2xl w-full max-w-md border border-slate-700/50 shadow-2xl overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-700/50 flex justify-between items-center bg-slate-800/30">
                <h2 class="text-xl font-bold flex items-center gap-2 text-slate-100">
                    <i data-lucide="settings-2" class="w-5 h-5 text-indigo-400"></i>
                    Settings
                </h2>
                <button id="closeSettings" class="text-slate-400 hover:text-white transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <div class="p-6 space-y-4">
                <div>
                    <label for="botToken" class="block text-sm font-medium text-slate-300 mb-1">Telegram Bot
                        Token</label>
                    <input type="password" id="botToken" placeholder="123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11"
                        class="w-full p-2.5 bg-slate-900/50 border border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all text-slate-200">
                </div>
                <div>
                    <label for="chatId" class="block text-sm font-medium text-slate-300 mb-1">Telegram Chat ID</label>
                    <input type="text" id="chatId" placeholder="-1001234567890"
                        class="w-full p-2.5 bg-slate-900/50 border border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all text-slate-200">
                </div>
                <div>
                    <label for="refreshInterval" class="block text-sm font-medium text-slate-300 mb-1">Refresh
                        Interval</label>
                    <select id="refreshInterval"
                        class="w-full p-2.5 bg-slate-900/50 border border-slate-700 rounded-lg focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all text-slate-200 appearance-none">
                        <option value="5">5 seconds</option>
                        <option value="10">10 seconds (Default)</option>
                        <option value="30">30 seconds</option>
                        <option value="60">1 minute</option>
                        <option value="300">5 minutes</option>
                    </select>
                </div>
            </div>

            <div class="px-6 py-4 border-t border-slate-700/50 bg-slate-800/30 flex justify-end gap-3">
                <button id="cancelSettings"
                    class="px-4 py-2 rounded-lg text-slate-300 hover:bg-white/5 transition-colors">Cancel</button>
                <button id="saveSettings"
                    class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2 rounded-lg transition-colors shadow-lg shadow-indigo-500/20 font-medium">Save
                    Changes</button>
            </div>
        </div>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // State & Config
        let symbols = JSON.parse(localStorage.getItem('symbols')) || ['BTC', 'ETH', 'SOL', 'NEAR', 'LDO', 'AAVE', 'ENA', 'FARTCOIN', 'ZRO', 'ZK', 'STRK', 'APT', 'CAKE'];
        let isGridView = JSON.parse(localStorage.getItem('isGridView')) ?? true; // Default grid view
        let settings = JSON.parse(localStorage.getItem('settings')) || { refreshInterval: 10 };
        let priceAlerts = JSON.parse(localStorage.getItem('priceAlerts')) || {};
        let refreshIntervalId;
        let globalMarketData = {}; // Cache to pass to modal

        const gridContainer = document.getElementById('pricesGrid');
        const listContainer = document.getElementById('pricesList');
        const listBody = document.getElementById('pricesListBody');

        // Setup initial UI view
        updateViewToggles();

        // -- API Interactions (Hyperliquid) --

        async function fetchHyperliquidMarketData() {
            try {
                const response = await fetch('https://api.hyperliquid.xyz/info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'metaAndAssetCtxs' })
                });

                if (!response.ok) throw new Error('Network response was not ok');

                const [meta, assetCtxs] = await response.json();
                const marketData = {};

                // Map Hyperliquid's dual-array structure into an accessible object
                meta.universe.forEach((coin, index) => {
                    const ctx = assetCtxs[index];
                    const prevPx = parseFloat(ctx.prevDayPx);
                    const markPx = parseFloat(ctx.markPx);
                    const changePct = prevPx ? ((markPx - prevPx) / prevPx) * 100 : 0;

                    marketData[coin.name] = {
                        symbol: coin.name,
                        lastPrice: markPx,
                        priceChangePercent: changePct,
                        volume: parseFloat(ctx.dayNtlVlm)
                    };
                });
                return marketData;
            } catch (error) {
                console.error('Error fetching Hyperliquid data:', error);
                return null;
            }
        }

        async function updateDashboard() {
            const data = await fetchHyperliquidMarketData();
            if (!data) return; // Silent fail on interval, handle graceful degradation later

            globalMarketData = data;

            // Clear current layout
            gridContainer.innerHTML = '';
            listBody.innerHTML = '';

            symbols.forEach(symbol => {
                const coinData = data[symbol];

                if (!coinData) {
                    // Symbol not found on Hyperliquid
                    renderErrorCard(symbol);
                    return;
                }

                checkPriceAlerts(coinData);

                if (isGridView) {
                    gridContainer.appendChild(createGridCard(coinData));
                } else {
                    listBody.appendChild(createListRow(coinData));
                }
            });

            updateLastRefreshTime();
        }

        // -- Rendering UI --

        function formatPrice(price) {
            // Smart formatting: if very small, show more decimals.
            if (price < 0.01) return price.toFixed(6);
            if (price < 1) return price.toFixed(5);
            return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 6 });
        }

        function formatVolume(volume) {
            if (volume >= 1e9) return '$' + (volume / 1e9).toFixed(2) + 'B';
            if (volume >= 1e6) return '$' + (volume / 1e6).toFixed(2) + 'M';
            if (volume >= 1e3) return '$' + (volume / 1e3).toFixed(2) + 'K';
            return '$' + volume.toLocaleString(undefined, { maximumFractionDigits: 0 });
        }

        function createGridCard(data) {
            const card = document.createElement('div');
            const isPositive = data.priceChangePercent >= 0;
            const colorClass = isPositive ? 'text-emerald-400' : 'text-rose-400';
            const bgGradient = isPositive ? 'from-emerald-500/10 to-transparent' : 'from-rose-500/10 to-transparent';
            const icon = isPositive ? '<i data-lucide="trending-up" class="w-5 h-5"></i>' : '<i data-lucide="trending-down" class="w-5 h-5"></i>';

            card.className = `glass-card rounded-2xl p-5 relative overflow-hidden group cursor-pointer hover:border-slate-500/50 transition-all duration-300 transform hover:-translate-y-1 bg-gradient-to-br ${bgGradient}`;

            card.innerHTML = `
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <h2 class="text-xl font-bold text-slate-100">${data.symbol}</h2>
                        <p class="text-xs text-slate-400 uppercase tracking-wider font-medium mt-1">Perpetual</p>
                    </div>
                    <div class="flex gap-2">
                        <button class="remove-btn p-1.5 text-slate-500 hover:text-rose-400 hover:bg-rose-500/10 rounded-lg transition-colors opacity-0 group-hover:opacity-100" title="Remove">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                </div>
                <div class="mt-2">
                    <p class="text-3xl font-bold tracking-tight text-white mb-1">$${formatPrice(data.lastPrice)}</p>
                    <div class="flex items-center gap-2 mt-2">
                        <span class="flex items-center gap-1 font-medium ${colorClass} bg-slate-900/50 px-2 py-1 rounded-md text-sm">
                            ${icon} ${Math.abs(data.priceChangePercent).toFixed(2)}%
                        </span>
                        <span class="text-xs text-slate-400 font-medium">Vol: ${formatVolume(data.volume)}</span>
                    </div>
                </div>
            `;

            // Attach calculator modal opening
            card.addEventListener('click', (e) => {
                if (!e.target.closest('.remove-btn')) showCalculatorModal(data);
            });

            // Attach removal logic
            card.querySelector('.remove-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                removeCoin(data.symbol);
            });

            setTimeout(() => lucide.createIcons({ root: card }), 0); // Re-init icons for dynamic content
            return card;
        }

        function createListRow(data) {
            const row = document.createElement('tr');
            const isPositive = data.priceChangePercent >= 0;
            const colorClass = isPositive ? 'text-emerald-400' : 'text-rose-400';
            const arrow = isPositive ? '▲' : '▼';

            row.className = 'hover:bg-slate-800/30 transition-colors cursor-pointer group';

            row.innerHTML = `
                <td class="px-6 py-4">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center border border-slate-700 font-bold text-xs text-slate-300">
                            ${data.symbol.substring(0, 2)}
                        </div>
                        <span class="font-bold text-slate-200">${data.symbol}</span>
                    </div>
                </td>
                <td class="px-6 py-4 font-mono text-slate-200">$${formatPrice(data.lastPrice)}</td>
                <td class="px-6 py-4 font-medium ${colorClass}">
                    <span class="bg-slate-900/50 px-2 py-1 rounded-md text-sm inline-flex items-center gap-1">
                        ${arrow} ${Math.abs(data.priceChangePercent).toFixed(2)}%
                    </span>
                </td>
                <td class="px-6 py-4 text-slate-400 font-mono text-sm">${formatVolume(data.volume)}</td>
                <td class="px-6 py-4 text-right">
                    <button class="remove-btn p-2 text-slate-500 hover:text-rose-400 hover:bg-rose-500/10 rounded-lg transition-colors opacity-0 group-hover:opacity-100" title="Remove">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </td>
            `;

            row.addEventListener('click', (e) => {
                if (!e.target.closest('.remove-btn')) showCalculatorModal(data);
            });

            row.querySelector('.remove-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                removeCoin(data.symbol);
            });

            setTimeout(() => lucide.createIcons({ root: row }), 0);
            return row;
        }

        function renderErrorCard(symbol) {
            if (isGridView) {
                const card = document.createElement('div');
                card.className = 'glass-card rounded-2xl p-5 border-rose-500/30 bg-rose-500/5 relative group';
                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <h2 class="text-xl font-bold text-rose-400/80">${symbol}</h2>
                        <button class="remove-btn p-1.5 text-slate-500 hover:text-rose-400 hover:bg-rose-500/10 rounded-lg transition-colors" title="Remove">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <p class="text-slate-400 text-sm mt-4 flex items-center gap-2">
                        <i data-lucide="alert-circle" class="w-4 h-4"></i> Not available
                    </p>
                `;
                card.querySelector('.remove-btn').addEventListener('click', () => removeCoin(symbol));
                gridContainer.appendChild(card);
                setTimeout(() => lucide.createIcons({ root: card }), 0);
            } else {
                const row = document.createElement('tr');
                row.className = 'bg-rose-500/5';
                row.innerHTML = `
                    <td class="px-6 py-4 font-bold text-rose-400/80">${symbol}</td>
                    <td class="px-6 py-4 text-slate-500" colspan="3">Asset not found on Hyperliquid</td>
                    <td class="px-6 py-4 text-right">
                        <button class="remove-btn p-2 text-slate-500 hover:text-rose-400 hover:bg-rose-500/10 rounded-lg transition-colors">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </td>
                `;
                row.querySelector('.remove-btn').addEventListener('click', () => removeCoin(symbol));
                listBody.appendChild(row);
                setTimeout(() => lucide.createIcons({ root: row }), 0);
            }
        }

        // -- Actions --

        function addCoin() {
            const input = document.getElementById('newCoin');
            const newCoin = input.value.toUpperCase().trim();
            if (newCoin && !symbols.includes(newCoin)) {
                symbols.unshift(newCoin); // Add to beginning
                localStorage.setItem('symbols', JSON.stringify(symbols));
                input.value = '';
                updateDashboard();
            }
        }

        function removeCoin(symbol) {
            const index = symbols.indexOf(symbol);
            if (index > -1) {
                symbols.splice(index, 1);
                localStorage.setItem('symbols', JSON.stringify(symbols));
                // Clear alerts for this coin
                delete priceAlerts[symbol];
                localStorage.setItem('priceAlerts', JSON.stringify(priceAlerts));
                updateDashboard();
            }
        }

        // -- Modals & Interaction --

        function showCalculatorModal(data) {
            const modal = document.getElementById('calculatorModal');

            document.getElementById('calcModalTitle').innerHTML = `<i data-lucide="calculator" class="w-5 h-5 text-blue-400"></i> ${data.symbol} Config`;
            document.getElementById('currentPrice').value = `$${formatPrice(data.lastPrice)}`;
            document.getElementById('priceChange').value = `${data.priceChangePercent.toFixed(2)}%`;

            const alerts = priceAlerts[data.symbol] || {};
            document.getElementById('abovePrice').value = alerts.above || '';
            document.getElementById('belowPrice').value = alerts.below || '';

            // Reset calc fields
            document.getElementById('percentageInput').value = '';
            document.getElementById('targetPrice').textContent = '-';
            document.getElementById('priceDiff').textContent = '-';

            document.getElementById('saveNotifications').onclick = () => {
                const above = document.getElementById('abovePrice').value;
                const below = document.getElementById('belowPrice').value;

                if (above || below) {
                    priceAlerts[data.symbol] = {
                        above: above ? parseFloat(above) : null,
                        below: below ? parseFloat(below) : null
                    };
                } else {
                    delete priceAlerts[data.symbol]; // clear if empty
                }
                localStorage.setItem('priceAlerts', JSON.stringify(priceAlerts));

                // Visual feedback
                const btn = document.getElementById('saveNotifications');
                const origText = btn.innerText;
                btn.innerText = 'Saved!';
                btn.classList.add('from-emerald-400', 'to-teal-500');
                setTimeout(() => {
                    btn.innerText = origText;
                    btn.classList.remove('from-emerald-400', 'to-teal-500');
                }, 2000);
            };

            // Set up active calc listener
            document.getElementById('percentageInput').oninput = (e) => {
                const percent = parseFloat(e.target.value) || 0;
                const target = data.lastPrice * (1 + (percent / 100));
                const diff = target - data.lastPrice;

                document.getElementById('targetPrice').textContent = `$${formatPrice(target)}`;

                const diffEl = document.getElementById('priceDiff');
                diffEl.textContent = `${diff >= 0 ? '+' : ''}$${formatPrice(diff)}`;
                diffEl.className = `font-mono font-medium ${diff >= 0 ? 'text-emerald-400' : 'text-rose-400'}`;
            };

            lucide.createIcons({ root: modal });
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        // -- View Toggling --

        function setView(isGrid) {
            isGridView = isGrid;
            localStorage.setItem('isGridView', isGridView);
            updateViewToggles();
            updateDashboard(); // Re-render from cache immediately
        }

        function updateViewToggles() {
            const gridBtn = document.getElementById('viewGridBtn');
            const listBtn = document.getElementById('viewListBtn');

            if (isGridView) {
                gridContainer.classList.remove('hidden');
                listContainer.classList.add('hidden');

                gridBtn.classList.add('bg-blue-500/20', 'text-blue-400');
                gridBtn.classList.remove('hover:bg-white/5', 'text-slate-400');

                listBtn.classList.remove('bg-blue-500/20', 'text-blue-400');
                listBtn.classList.add('hover:bg-white/5', 'text-slate-400');
            } else {
                gridContainer.classList.add('hidden');
                listContainer.classList.remove('hidden');

                listBtn.classList.add('bg-blue-500/20', 'text-blue-400');
                listBtn.classList.remove('hover:bg-white/5', 'text-slate-400');

                gridBtn.classList.remove('bg-blue-500/20', 'text-blue-400');
                gridBtn.classList.add('hover:bg-white/5', 'text-slate-400');
            }
        }

        // -- Alerts & Scheduling --

        function checkPriceAlerts(data) {
            const alerts = priceAlerts[data.symbol];
            if (!alerts) return;

            if (alerts.above && data.lastPrice >= alerts.above) {
                sendNotification(`🚀 ${data.symbol} has crossed ABOVE $${alerts.above} (Current: $${formatPrice(data.lastPrice)})`);
                alerts.above = null; // Fire once
                localStorage.setItem('priceAlerts', JSON.stringify(priceAlerts));
            }
            if (alerts.below && data.lastPrice <= alerts.below) {
                sendNotification(`📉 ${data.symbol} has dropped BELOW $${alerts.below} (Current: $${formatPrice(data.lastPrice)})`);
                alerts.below = null; // Fire once
                localStorage.setItem('priceAlerts', JSON.stringify(priceAlerts));
            }
        }

        function sendNotification(message) {
            const { botToken, chatId } = settings;
            if (botToken && chatId) {
                fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: message })
                }).catch(console.error);
            }
        }

        function updateLastRefreshTime() {
            document.getElementById('lastRefreshTime').textContent = moment().format('HH:mm:ss');
        }

        function startPriceRefresh() {
            if (refreshIntervalId) clearInterval(refreshIntervalId);
            const intervalInMs = (settings.refreshInterval || 10) * 1000;
            updateDashboard(); // initial fetch
            refreshIntervalId = setInterval(updateDashboard, intervalInMs);
        }

        // -- Event Listeners --

        document.getElementById('newCoin').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addCoin();
        });

        document.getElementById('viewGridBtn').addEventListener('click', () => setView(true));
        document.getElementById('viewListBtn').addEventListener('click', () => setView(false));

        document.getElementById('closeCalc').addEventListener('click', () => {
            document.getElementById('calculatorModal').classList.add('hidden');
            document.getElementById('calculatorModal').classList.remove('flex');
        });

        // Close modal on outside click
        document.getElementById('calculatorModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('calculatorModal')) {
                document.getElementById('closeCalc').click();
            }
        });

        // Settings events
        document.getElementById('settingsBtn').addEventListener('click', () => {
            document.getElementById('settingsModal').classList.remove('hidden');
            document.getElementById('settingsModal').classList.add('flex');
            document.getElementById('botToken').value = settings.botToken || '';
            document.getElementById('chatId').value = settings.chatId || '';
            document.getElementById('refreshInterval').value = settings.refreshInterval || '10';
        });

        const closeSet = () => {
            document.getElementById('settingsModal').classList.add('hidden');
            document.getElementById('settingsModal').classList.remove('flex');
        };
        document.getElementById('closeSettings').addEventListener('click', closeSet);
        document.getElementById('cancelSettings').addEventListener('click', closeSet);
        document.getElementById('settingsModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('settingsModal')) closeSet();
        });

        document.getElementById('saveSettings').addEventListener('click', () => {
            settings.botToken = document.getElementById('botToken').value;
            settings.chatId = document.getElementById('chatId').value;
            settings.refreshInterval = parseInt(document.getElementById('refreshInterval').value) || 10;
            localStorage.setItem('settings', JSON.stringify(settings));
            closeSet();
            startPriceRefresh(); // restart interval with new timing
        });

        // Initialize App
        window.onload = startPriceRefresh;

    </script>
</body>

</html>
