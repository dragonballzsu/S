<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Exchange Price Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #030712;
            --surface: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.16);
            --text: #e2e8f0;
            --text-muted: #64748b;
            --text-dim: #94a3b8;
            --accent: #22d3ee;
            --accent2: #818cf8;
            --green: #34d399;
            --red: #f87171;
            --card-blur: blur(24px);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-orbs {
            position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
        }
        .bg-orbs span {
            position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.15;
            animation: drift 18s ease-in-out infinite alternate;
        }
        .bg-orbs span:nth-child(1) { width: 60vw; height: 60vw; top: -20%; left: -10%; background: #1e40af; animation-duration: 20s; }
        .bg-orbs span:nth-child(2) { width: 50vw; height: 50vw; bottom: -15%; right: -10%; background: #6d28d9; animation-duration: 25s; animation-delay: -5s; }
        .bg-orbs span:nth-child(3) { width: 30vw; height: 30vw; top: 40%; left: 45%; background: #0e7490; animation-duration: 30s; animation-delay: -10s; }

        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(40px, 30px) scale(1.08); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }

        /* ── Header ── */
        header {
            position: sticky; top: 0; z-index: 50;
            background: rgba(3,7,18,0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
        }
        .header-inner {
            display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
        }
        .logo {
            font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo-sub { font-size: 0.75rem; color: var(--text-muted); font-weight: 400; margin-top: 2px; }
        .header-right { display: flex; align-items: center; gap: 10px; margin-left: auto; flex-wrap: wrap; }

        /* Exchange switcher */
        .exchange-switcher {
            display: flex; gap: 4px; padding: 4px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            backdrop-filter: var(--card-blur);
        }
        .ex-btn {
            padding: 7px 16px; border-radius: 8px; border: none; cursor: pointer;
            font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 600;
            color: var(--text-muted); background: transparent;
            transition: all 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 6px;
        }
        .ex-btn .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
        .ex-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
        .ex-btn.active { color: white; background: rgba(34,211,238,0.15); border: 1px solid rgba(34,211,238,0.3); }
        .ex-btn.active[data-ex="lighter"] { background: rgba(129,140,248,0.15); border-color: rgba(129,140,248,0.3); color: #a5b4fc; }
        .ex-btn.active[data-ex="asterdex"] { background: rgba(52,211,153,0.15); border-color: rgba(52,211,153,0.3); color: #6ee7b7; }

        /* Search & view controls */
        .search-wrap { position: relative; }
        .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
        #newCoin {
            background: var(--surface); border: 1px solid var(--border);
            backdrop-filter: var(--card-blur); border-radius: 10px;
            padding: 8px 12px 8px 34px; color: var(--text); font-family: 'Inter', sans-serif;
            font-size: 0.85rem; width: 200px; outline: none;
            transition: border-color 0.2s;
        }
        #newCoin::placeholder { color: var(--text-muted); }
        #newCoin:focus { border-color: rgba(34,211,238,0.4); }

        .view-toggle {
            display: flex; gap: 2px; padding: 4px;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px;
        }
        .view-btn {
            padding: 7px; border-radius: 7px; border: none; cursor: pointer;
            background: transparent; color: var(--text-muted); transition: all 0.2s;
        }
        .view-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
        .view-btn.active { color: var(--accent); background: rgba(34,211,238,0.1); }

        /* ── Main Content ── */
        main { position: relative; z-index: 1; padding: 32px 0 60px; }

        .status-bar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px; flex-wrap: wrap; gap: 8px;
        }
        .status-left { display: flex; align-items: center; gap: 10px; }
        .live-dot {
            width: 8px; height: 8px; border-radius: 50%; background: var(--green);
            box-shadow: 0 0 8px var(--green);
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,100% { opacity: 1; } 50% { opacity: 0.4; }
        }
        .status-text { font-size: 0.8rem; color: var(--text-muted); }
        .refresh-time { font-size: 0.8rem; color: var(--text-muted); font-variant-numeric: tabular-nums; }

        /* ── Cards Grid ── */
        #pricesGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }

        .price-card {
            background: var(--surface);
            backdrop-filter: var(--card-blur);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }
        .price-card::before {
            content: '';
            position: absolute; inset: 0; border-radius: 20px;
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 60%);
            pointer-events: none;
        }
        .price-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06);
        }
        .price-card.positive { border-top: 1px solid rgba(52,211,153,0.25); }
        .price-card.negative { border-top: 1px solid rgba(248,113,113,0.2); }
        .price-card.positive::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(52,211,153,0.4), transparent);
        }
        .price-card.negative::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(248,113,113,0.3), transparent);
        }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .card-symbol { font-size: 1.1rem; font-weight: 700; color: white; }
        .card-type { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-top: 3px; font-weight: 500; }

        .ex-badge {
            font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em;
            padding: 3px 8px; border-radius: 6px; white-space: nowrap;
        }
        .ex-badge.hl  { background: rgba(34,211,238,0.1);  color: #22d3ee; border: 1px solid rgba(34,211,238,0.2); }
        .ex-badge.lt  { background: rgba(129,140,248,0.1); color: #818cf8; border: 1px solid rgba(129,140,248,0.2); }
        .ex-badge.ad  { background: rgba(52,211,153,0.1);  color: #34d399; border: 1px solid rgba(52,211,153,0.2); }

        .card-price { font-size: 1.6rem; font-weight: 800; color: white; font-variant-numeric: tabular-nums; letter-spacing: -0.5px; }

        .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; }
        .change-badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 10px; border-radius: 8px; font-size: 0.8rem; font-weight: 600;
        }
        .change-badge.up   { background: rgba(52,211,153,0.12); color: var(--green); }
        .change-badge.down { background: rgba(248,113,113,0.12); color: var(--red); }
        .card-vol { font-size: 0.72rem; color: var(--text-muted); }

        .remove-btn {
            position: absolute; top: 14px; right: 14px;
            padding: 5px; border-radius: 7px; border: none; cursor: pointer;
            background: transparent; color: var(--text-muted);
            opacity: 0; transition: all 0.2s;
        }
        .price-card:hover .remove-btn { opacity: 1; }
        .remove-btn:hover { background: rgba(248,113,113,0.15); color: var(--red); }

        /* Error card */
        .error-card {
            background: rgba(248,113,113,0.04);
            border: 1px solid rgba(248,113,113,0.15);
            border-radius: 20px; padding: 20px;
        }

        /* ── List View ── */
        #pricesList { display: none; }
        .list-table {
            width: 100%; border-collapse: collapse;
            background: var(--surface); backdrop-filter: var(--card-blur);
            border: 1px solid var(--border); border-radius: 20px; overflow: hidden;
        }
        .list-table th {
            padding: 14px 20px; text-align: left; font-size: 0.72rem;
            text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted);
            border-bottom: 1px solid var(--border); font-weight: 600;
            background: rgba(255,255,255,0.02);
        }
        .list-table td { padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.88rem; }
        .list-table tr:last-child td { border-bottom: none; }
        .list-table tbody tr { cursor: pointer; transition: background 0.15s; }
        .list-table tbody tr:hover { background: rgba(255,255,255,0.03); }
        .list-sym { display: flex; align-items: center; gap: 10px; }
        .sym-icon {
            width: 32px; height: 32px; border-radius: 50%;
            background: rgba(255,255,255,0.06); border: 1px solid var(--border);
            font-size: 0.7rem; font-weight: 700; color: var(--text-dim);
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }

        /* ── Loading ── */
        #loadingIndicator { text-align: center; padding: 80px 0; display: none; }
        .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(3,7,18,0.75);
            backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center;
            z-index: 100; padding: 16px;
        }
        .modal-overlay.open { display: flex; }
        .modal-box {
            background: rgba(15,23,42,0.95);
            border: 1px solid var(--border);
            border-radius: 24px; width: 100%; max-width: 420px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6);
            overflow: hidden;
            backdrop-filter: var(--card-blur);
        }
        .modal-head {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 24px; border-bottom: 1px solid var(--border);
        }
        .modal-title { font-size: 1rem; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .modal-close {
            padding: 6px; border-radius: 8px; border: none; cursor: pointer;
            background: transparent; color: var(--text-muted); transition: all 0.2s;
        }
        .modal-close:hover { background: rgba(255,255,255,0.06); color: var(--text); }
        .modal-body { padding: 24px; max-height: 80vh; overflow-y: auto; }
        .modal-body .field { margin-bottom: 16px; }
        .modal-body label { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 6px; font-weight: 600; }
        .modal-body input, .modal-body select {
            width: 100%; padding: 10px 14px;
            background: rgba(255,255,255,0.04); border: 1px solid var(--border);
            border-radius: 10px; color: var(--text); font-family: 'Inter', sans-serif;
            font-size: 0.88rem; outline: none; transition: border-color 0.2s;
            appearance: none;
        }
        .modal-body input:focus, .modal-body select:focus { border-color: rgba(34,211,238,0.4); }
        .modal-body input[readonly] { color: var(--text-dim); cursor: default; }
        .section-card {
            background: rgba(255,255,255,0.03); border: 1px solid var(--border);
            border-radius: 14px; padding: 16px; margin-bottom: 16px;
        }
        .section-title { font-size: 0.85rem; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }

        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }

        .calc-result { display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; padding: 6px 0; }
        .calc-result span:first-child { color: var(--text-muted); }
        .calc-result span:last-child { font-weight: 600; font-variant-numeric: tabular-nums; }

        .btn-primary {
            width: 100%; padding: 11px; border-radius: 10px; border: none; cursor: pointer;
            font-family: 'Inter', sans-serif; font-size: 0.88rem; font-weight: 600;
            background: linear-gradient(135deg, rgba(34,211,238,0.25), rgba(129,140,248,0.25));
            color: var(--accent); border: 1px solid rgba(34,211,238,0.25);
            transition: all 0.2s;
        }
        .btn-primary:hover { background: linear-gradient(135deg, rgba(34,211,238,0.35), rgba(129,140,248,0.35)); }

        .modal-foot {
            display: flex; justify-content: flex-end; gap: 10px;
            padding: 16px 24px; border-top: 1px solid var(--border);
        }
        .btn-ghost { padding: 9px 18px; border-radius: 10px; border: 1px solid var(--border); cursor: pointer; background: transparent; color: var(--text-dim); font-family: 'Inter', sans-serif; font-size: 0.85rem; transition: all 0.2s; }
        .btn-ghost:hover { border-color: var(--border-hover); color: var(--text); }
        .btn-save { padding: 9px 20px; border-radius: 10px; border: none; cursor: pointer; background: var(--accent); color: #030712; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 700; transition: all 0.2s; }
        .btn-save:hover { filter: brightness(1.1); }

        /* Responsive */
        @media (max-width: 600px) {
            .exchange-switcher { flex-wrap: wrap; }
            #newCoin { width: 160px; }
        }
    </style>
</head>
<body>
    <div class="bg-orbs"><span></span><span></span><span></span></div>

    <header>
        <div class="container header-inner">
            <div>
                <div class="logo">⬡ Market Pulse</div>
                <div class="logo-sub">Multi-Exchange Price Tracker</div>
            </div>
            <div class="header-right">
                <div class="exchange-switcher">
                    <button class="ex-btn active" data-ex="hyperliquid">
                        <span class="dot"></span> Hyperliquid
                    </button>
                    <button class="ex-btn" data-ex="lighter">
                        <span class="dot"></span> Lighter
                    </button>
                    <button class="ex-btn" data-ex="asterdex">
                        <span class="dot"></span> AsterDex
                    </button>
                </div>
                <div class="search-wrap">
                    <i data-lucide="search" style="width:15px;height:15px;position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i>
                    <input type="text" id="newCoin" placeholder="Add token…">
                </div>
                <div class="view-toggle">
                    <button class="view-btn active" id="viewGridBtn" title="Grid"><i data-lucide="layout-grid" style="width:16px;height:16px"></i></button>
                    <button class="view-btn" id="viewListBtn" title="List"><i data-lucide="list" style="width:16px;height:16px"></i></button>
                </div>
                <button id="settingsBtn" style="padding:8px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface);backdrop-filter:var(--card-blur);color:var(--text-dim);cursor:pointer;display:flex;align-items:center;gap:6px;font-size:0.82rem;font-family:Inter,sans-serif;transition:all 0.2s" onmouseover="this.style.borderColor='var(--border-hover)'" onmouseout="this.style.borderColor='var(--border)'">
                    <i data-lucide="settings" style="width:15px;height:15px"></i> Settings
                </button>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="status-bar">
                <div class="status-left">
                    <div class="live-dot" id="liveDot"></div>
                    <span class="status-text" id="exchangeLabel">Hyperliquid Perpetuals</span>
                </div>
                <span class="refresh-time">Updated <span id="lastRefreshTime">—</span></span>
            </div>

            <div id="loadingIndicator">
                <div class="spinner"></div>
                <p style="color:var(--text-muted);font-size:0.88rem">Fetching market data…</p>
            </div>

            <div id="pricesGrid"></div>
            <div id="pricesList">
                <table class="list-table">
                    <thead>
                        <tr>
                            <th>Asset</th>
                            <th>Price</th>
                            <th>24h Change</th>
                            <th>Volume</th>
                            <th style="text-align:right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="pricesListBody"></tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Calculator Modal -->
    <div class="modal-overlay" id="calcModal">
        <div class="modal-box">
            <div class="modal-head">
                <div class="modal-title" id="calcTitle">
                    <i data-lucide="calculator" style="width:18px;height:18px;color:var(--accent)"></i> Calculator
                </div>
                <button class="modal-close" id="closeCalc"><i data-lucide="x" style="width:16px;height:16px"></i></button>
            </div>
            <div class="modal-body">
                <div class="calc-grid">
                    <div class="field">
                        <label>Current Price</label>
                        <input type="text" id="currentPrice" readonly>
                    </div>
                    <div class="field">
                        <label>24h Change</label>
                        <input type="text" id="priceChange" readonly>
                    </div>
                </div>
                <div class="section-card">
                    <div class="section-title">
                        <i data-lucide="target" style="width:15px;height:15px;color:var(--accent2)"></i> Target Calculator
                    </div>
                    <div class="field">
                        <label>Percentage Change (%)</label>
                        <input type="number" id="percentageInput" placeholder="e.g. 10 or -5">
                    </div>
                    <div class="calc-result"><span>Target Price</span><span id="targetPrice">—</span></div>
                    <div style="height:1px;background:var(--border);margin:6px 0"></div>
                    <div class="calc-result"><span>Difference</span><span id="priceDiff">—</span></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-box">
            <div class="modal-head">
                <div class="modal-title">
                    <i data-lucide="settings-2" style="width:18px;height:18px;color:var(--accent2)"></i> Settings
                </div>
                <button class="modal-close" id="closeSettings"><i data-lucide="x" style="width:16px;height:16px"></i></button>
            </div>
            <div class="modal-body">
                <div class="field">
                    <label>Refresh Interval</label>
                    <select id="refreshInterval">
                        <option value="5">5 seconds</option>
                        <option value="10" selected>10 seconds</option>
                        <option value="30">30 seconds</option>
                        <option value="60">1 minute</option>
                        <option value="300">5 minutes</option>
                    </select>
                </div>
            </div>
            <div class="modal-foot">
                <button class="btn-ghost" id="cancelSettings">Cancel</button>
                <button class="btn-save" id="saveSettings">Save</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // ── State ──
        const DEFAULT_SYMBOLS = {
            hyperliquid: ['BTC','ETH','SOL','NEAR','AAVE','ENA','FARTCOIN','APT'],
            lighter:     ['BTC','ETH','SOL','ARB','OP'],
            asterdex:    ['BTCUSDT','ETHUSDT','SOLUSDT','BNBUSDT','NEARUSDT']
        };

        const EXCHANGE_META = {
            hyperliquid: { label: 'Hyperliquid Perpetuals', badge: 'HL', cls: 'hl', type: 'Perpetual' },
            lighter:     { label: 'Lighter Exchange',       badge: 'LT', cls: 'lt', type: 'Perp' },
            asterdex:    { label: 'AsterDex Futures',       badge: 'AD', cls: 'ad', type: 'Futures' }
        };

        let activeExchange = localStorage.getItem('activeExchange') || 'hyperliquid';

        // Per-exchange symbol lists
        let symbolSets = JSON.parse(localStorage.getItem('symbolSets')) || DEFAULT_SYMBOLS;
        let isGridView = JSON.parse(localStorage.getItem('isGridView')) ?? true;
        let settings   = JSON.parse(localStorage.getItem('settings'))   || { refreshInterval: 10 };
        let refreshIntervalId;
        let globalMarketData = {};

        const gridEl     = document.getElementById('pricesGrid');
        const listEl     = document.getElementById('pricesList');
        const listBody   = document.getElementById('pricesListBody');
        const loadingEl  = document.getElementById('loadingIndicator');

        function getSymbols() { return symbolSets[activeExchange] || []; }

        // ── Fetch: Hyperliquid ──
        async function fetchHyperliquid() {
            const r = await fetch('https://api.hyperliquid.xyz/info', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ type: 'metaAndAssetCtxs' })
            });
            const [meta, ctxs] = await r.json();
            const out = {};
            meta.universe.forEach((coin, i) => {
                const ctx = ctxs[i];
                const prev = parseFloat(ctx.prevDayPx);
                const mark = parseFloat(ctx.markPx);
                out[coin.name] = {
                    symbol: coin.name,
                    lastPrice: mark,
                    priceChangePercent: prev ? ((mark - prev) / prev) * 100 : 0,
                    volume: parseFloat(ctx.dayNtlVlm)
                };
            });
            return out;
        }

        // ── Fetch: Lighter ──
        async function fetchLighter() {
            // Lighter's API is CloudFront-gated. Try direct browser fetch which may
            // pass different origin headers than server-side or proxy attempts.
            const DIRECT = 'https://mainnet.zklighter.elliot.ai/api/v1/orderbooks?blockchain_index=0';
            const r = await fetch(DIRECT, { headers: { 'Accept': 'application/json' } });
            if (!r.ok) {
                // Return a special sentinel so updateDashboard knows to show API error
                return { __lighter_error: r.status };
            }
            const json = await r.json();
            const out = {};
            const books = json.order_books || json.orderBooks || json.result || [];
            books.forEach(b => {
                const sym = (b.base_asset || b.baseAsset || b.symbol || '').toUpperCase()
                    .replace('USDT','').replace('-USDT','').replace('-USD','');
                const price = parseFloat(b.mark_price || b.markPrice || b.last_price || b.price || 0);
                const prev  = parseFloat(b.index_price || b.indexPrice || b.prev_price || price);
                const changePct = prev ? ((price - prev) / prev) * 100 : 0;
                const vol = parseFloat(b.volume_24h || b.volume || b.volume_base_24h || 0);
                if (sym && price) {
                    out[sym] = { symbol: sym, lastPrice: price, priceChangePercent: changePct, volume: vol };
                }
            });
            return out;
        }


        // ── Fetch: AsterDex ──
        async function fetchAsterDex() {
            const r = await fetch('https://fapi.asterdex.com/fapi/v1/ticker/24hr');
            const arr = await r.json();
            const out = {};
            arr.forEach(t => {
                out[t.symbol] = {
                    symbol: t.symbol,
                    lastPrice: parseFloat(t.lastPrice),
                    priceChangePercent: parseFloat(t.priceChangePercent),
                    volume: parseFloat(t.quoteVolume)
                };
            });
            return out;
        }

        // ── Dispatch ──
        async function fetchMarketData() {
            try {
                if (activeExchange === 'hyperliquid') return await fetchHyperliquid();
                if (activeExchange === 'lighter')     return await fetchLighter();
                if (activeExchange === 'asterdex')    return await fetchAsterDex();
            } catch(e) {
                console.error('Fetch error:', e);
                return null;
            }
        }

        // ── Format helpers ──
        function formatPrice(p) {
            if (!p && p !== 0) return '—';
            if (p < 0.01)  return p.toFixed(6);
            if (p < 1)     return p.toFixed(5);
            if (p < 100)   return p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 4 });
            return p.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
        function formatVolume(v) {
            if (v >= 1e9) return '$' + (v/1e9).toFixed(2) + 'B';
            if (v >= 1e6) return '$' + (v/1e6).toFixed(2) + 'M';
            if (v >= 1e3) return '$' + (v/1e3).toFixed(2) + 'K';
            return '$' + (v||0).toFixed(0);
        }

        // ── Render ──
        function createGridCard(data) {
            const meta = EXCHANGE_META[activeExchange];
            const pos  = data.priceChangePercent >= 0;
            const card = document.createElement('div');
            card.className = `price-card ${pos ? 'positive' : 'negative'}`;
            card.innerHTML = `
                <button class="remove-btn" title="Remove"><i data-lucide="x" style="width:13px;height:13px"></i></button>
                <div class="card-header">
                    <div>
                        <div class="card-symbol">${data.symbol.replace('USDT','')}</div>
                        <div class="card-type">${meta.type}</div>
                    </div>
                    <span class="ex-badge ${meta.cls}">${meta.badge}</span>
                </div>
                <div class="card-price">$${formatPrice(data.lastPrice)}</div>
                <div class="card-footer">
                    <span class="change-badge ${pos ? 'up' : 'down'}">
                        <i data-lucide="${pos ? 'trending-up' : 'trending-down'}" style="width:12px;height:12px"></i>
                        ${Math.abs(data.priceChangePercent).toFixed(2)}%
                    </span>
                    <span class="card-vol">${formatVolume(data.volume)}</span>
                </div>`;
            card.addEventListener('click', e => { if (!e.target.closest('.remove-btn')) showCalc(data); });
            card.querySelector('.remove-btn').addEventListener('click', e => { e.stopPropagation(); removeCoin(data.symbol); });
            setTimeout(() => lucide.createIcons({ root: card }), 0);
            return card;
        }

        function createListRow(data) {
            const meta = EXCHANGE_META[activeExchange];
            const pos  = data.priceChangePercent >= 0;
            const row  = document.createElement('tr');
            const displaySym = data.symbol.replace('USDT','');
            row.innerHTML = `
                <td>
                    <div class="list-sym">
                        <div class="sym-icon">${displaySym.substring(0,2)}</div>
                        <div>
                            <div style="font-weight:700;color:white">${displaySym}</div>
                            <span class="ex-badge ${meta.cls}" style="margin-top:3px;display:inline-block">${meta.badge}</span>
                        </div>
                    </div>
                </td>
                <td style="font-variant-numeric:tabular-nums;font-weight:600">$${formatPrice(data.lastPrice)}</td>
                <td><span class="change-badge ${pos?'up':'down'}">${pos?'▲':'▼'} ${Math.abs(data.priceChangePercent).toFixed(2)}%</span></td>
                <td style="color:var(--text-muted)">${formatVolume(data.volume)}</td>
                <td style="text-align:right">
                    <button class="remove-btn" style="position:static;opacity:1" title="Remove"><i data-lucide="x" style="width:13px;height:13px"></i></button>
                </td>`;
            row.addEventListener('click', e => { if (!e.target.closest('.remove-btn')) showCalc(data); });
            row.querySelector('.remove-btn').addEventListener('click', e => { e.stopPropagation(); removeCoin(data.symbol); });
            setTimeout(() => lucide.createIcons({ root: row }), 0);
            return row;
        }

        function renderErrorCard(symbol) {
            const displaySym = symbol.replace('USDT','');
            if (isGridView) {
                const card = document.createElement('div');
                card.className = 'error-card';
                card.innerHTML = `
                    <div style="display:flex;justify-content:space-between;align-items:center">
                        <span style="font-weight:700;color:var(--red)">${displaySym}</span>
                        <button class="remove-btn" style="position:static;opacity:1"><i data-lucide="x" style="width:13px;height:13px"></i></button>
                    </div>
                    <p style="font-size:0.78rem;color:var(--text-muted);margin-top:10px">Not found on this exchange</p>`;
                card.querySelector('.remove-btn').addEventListener('click', () => removeCoin(symbol));
                gridEl.appendChild(card);
                setTimeout(() => lucide.createIcons({ root: card }), 0);
            } else {
                const row = document.createElement('tr');
                row.innerHTML = `<td style="color:var(--red);font-weight:700">${displaySym}</td><td colspan="3" style="color:var(--text-muted)">Not available on this exchange</td><td></td>`;
                listBody.appendChild(row);
            }
        }

        // ── Dashboard Update ──
        async function updateDashboard() {
            const data = await fetchMarketData();
            if (!data) return;
            globalMarketData = data;

            gridEl.innerHTML = '';
            listBody.innerHTML = '';

            // Handle Lighter API returning error sentinel
            if (data.__lighter_error) {
                const banner = document.createElement('div');
                banner.style.cssText = 'grid-column:1/-1;background:rgba(129,140,248,0.06);border:1px solid rgba(129,140,248,0.2);border-radius:20px;padding:32px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px';
                banner.innerHTML = `
                    <i data-lucide="shield-alert" style="width:36px;height:36px;color:#818cf8;margin-bottom:4px"></i>
                    <p style="font-size:1rem;font-weight:700;color:#a5b4fc">Lighter API unavailable</p>
                    <p style="font-size:0.82rem;color:var(--text-muted);max-width:400px">The Lighter Exchange API (${data.__lighter_error}) is restricted to whitelisted origins. Open <a href="https://app.lighter.xyz" target="_blank" style="color:#818cf8;text-decoration:underline">app.lighter.xyz</a> directly to view prices.</p>`;
                gridEl.appendChild(banner);
                setTimeout(() => lucide.createIcons({ root: banner }), 0);
                document.getElementById('lastRefreshTime').textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
                return;
            }

            getSymbols().forEach(sym => {
                const coinData = data[sym];
                if (!coinData) { renderErrorCard(sym); return; }
                if (isGridView) gridEl.appendChild(createGridCard(coinData));
                else            listBody.appendChild(createListRow(coinData));
            });

            document.getElementById('lastRefreshTime').textContent = new Date().toLocaleTimeString('en-US', { hour12: false });
        }


        // ── Coin Management ──
        function addCoin() {
            const inp = document.getElementById('newCoin');
            let val = inp.value.trim().toUpperCase();
            if (activeExchange === 'asterdex' && !val.endsWith('USDT')) val += 'USDT';
            if (val && !getSymbols().includes(val)) {
                symbolSets[activeExchange].unshift(val);
                localStorage.setItem('symbolSets', JSON.stringify(symbolSets));
                inp.value = '';
                updateDashboard();
            }
        }
        function removeCoin(sym) {
            symbolSets[activeExchange] = symbolSets[activeExchange].filter(s => s !== sym);
            localStorage.setItem('symbolSets', JSON.stringify(symbolSets));
            updateDashboard();
        }

        // ── Exchange Switcher ──
        document.querySelectorAll('.ex-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                activeExchange = btn.dataset.ex;
                localStorage.setItem('activeExchange', activeExchange);
                document.querySelectorAll('.ex-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('exchangeLabel').textContent = EXCHANGE_META[activeExchange].label;
                // Ensure symbol list exists
                if (!symbolSets[activeExchange]) symbolSets[activeExchange] = DEFAULT_SYMBOLS[activeExchange] || [];
                updateDashboard();
            });
        });

        // Set initial exchange button state
        document.querySelector(`.ex-btn[data-ex="${activeExchange}"]`)?.classList.add('active');
        document.querySelectorAll('.ex-btn').forEach(b => { if (b.dataset.ex !== activeExchange) b.classList.remove('active'); });
        document.getElementById('exchangeLabel').textContent = EXCHANGE_META[activeExchange].label;

        // ── View Toggle ──
        document.getElementById('viewGridBtn').addEventListener('click', () => {
            isGridView = true; localStorage.setItem('isGridView', true); updateViewToggle(); updateDashboard();
        });
        document.getElementById('viewListBtn').addEventListener('click', () => {
            isGridView = false; localStorage.setItem('isGridView', false); updateViewToggle(); updateDashboard();
        });
        function updateViewToggle() {
            document.getElementById('viewGridBtn').classList.toggle('active', isGridView);
            document.getElementById('viewListBtn').classList.toggle('active', !isGridView);
            gridEl.style.display = isGridView ? 'grid' : 'none';
            listEl.style.display = isGridView ? 'none' : 'block';
        }
        updateViewToggle();

        // ── Calculator Modal ──
        function showCalc(data) {
            const modal = document.getElementById('calcModal');
            const displaySym = data.symbol.replace('USDT','');
            document.getElementById('calcTitle').innerHTML = `<i data-lucide="calculator" style="width:18px;height:18px;color:var(--accent)"></i> ${displaySym}`;
            document.getElementById('currentPrice').value = `$${formatPrice(data.lastPrice)}`;
            document.getElementById('priceChange').value  = `${data.priceChangePercent >= 0 ? '+' : ''}${data.priceChangePercent.toFixed(2)}%`;
            document.getElementById('percentageInput').value = '';
            document.getElementById('targetPrice').textContent = '—';
            document.getElementById('priceDiff').textContent   = '—';
            document.getElementById('percentageInput').oninput = (e) => {
                const pct = parseFloat(e.target.value) || 0;
                const tgt = data.lastPrice * (1 + pct / 100);
                const dif = tgt - data.lastPrice;
                document.getElementById('targetPrice').textContent = `$${formatPrice(tgt)}`;
                const el = document.getElementById('priceDiff');
                el.textContent = `${dif >= 0 ? '+' : ''}$${formatPrice(Math.abs(dif))}`;
                el.style.color = dif >= 0 ? 'var(--green)' : 'var(--red)';
            };
            lucide.createIcons({ root: modal });
            modal.classList.add('open');
        }
        document.getElementById('closeCalc').addEventListener('click', () => document.getElementById('calcModal').classList.remove('open'));
        document.getElementById('calcModal').addEventListener('click', e => { if (e.target === document.getElementById('calcModal')) e.target.classList.remove('open'); });

        // ── Settings Modal ──
        document.getElementById('settingsBtn').addEventListener('click', () => {
            document.getElementById('refreshInterval').value = settings.refreshInterval || 10;
            document.getElementById('settingsModal').classList.add('open');
        });
        const closeSettings = () => document.getElementById('settingsModal').classList.remove('open');
        document.getElementById('closeSettings').addEventListener('click', closeSettings);
        document.getElementById('cancelSettings').addEventListener('click', closeSettings);
        document.getElementById('settingsModal').addEventListener('click', e => { if (e.target === document.getElementById('settingsModal')) closeSettings(); });
        document.getElementById('saveSettings').addEventListener('click', () => {
            settings.refreshInterval = parseInt(document.getElementById('refreshInterval').value) || 10;
            localStorage.setItem('settings', JSON.stringify(settings));
            closeSettings();
            startRefresh();
        });

        // ── Add coin ──
        document.getElementById('newCoin').addEventListener('keypress', e => { if (e.key === 'Enter') addCoin(); });

        // ── Refresh Loop ──
        function startRefresh() {
            if (refreshIntervalId) clearInterval(refreshIntervalId);
            updateDashboard();
            refreshIntervalId = setInterval(updateDashboard, (settings.refreshInterval || 10) * 1000);
        }

        window.onload = startRefresh;
    </script>
</body>
</html>
